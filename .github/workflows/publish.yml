name: Build & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

  create-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.check.outputs.created }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for release commit
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if echo "$COMMIT_MSG" | grep -qP 'for v(\d+\.\d+\.\d+)'; then
            VERSION=$(echo "$COMMIT_MSG" | grep -oP 'for v\K(\d+\.\d+\.\d+)')
            echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "Detected release commit for v$VERSION"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Not a release commit, skipping"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.created == 'true'
        run: gh release create "${{ steps.check.outputs.version }}" --generate-notes --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    needs: [build, create-release]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (github.event_name == 'release' || needs.create-release.outputs.created == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG_VERSION). Bump the version before creating a release."
            exit 1
          fi

      - run: npm ci

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-pages:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build Astro site
        working-directory: pages
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
